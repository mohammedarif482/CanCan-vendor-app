name: cancan_vendor
description: Can Can Vendor App - Water can delivery management for vendors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Backend)
  supabase_flutter: ^2.5.0

  # State Management
  provider: ^6.1.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  
  # Date & Time
  intl: ^0.19.0
  
  # Phone Authentication
  pinput: ^5.0.0  # OTP input field
  
  # QR Code
  qr_flutter: ^4.1.0
  
  # URL Launcher (WhatsApp, Phone calls)
  url_launcher: ^6.2.0
  
  # Image Handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  
  # Push Notifications
  firebase_core: ^2.24.0
  firebase_messaging: ^14.7.0
  flutter_local_notifications: ^19.5.0  
  
  # Permissions
  permission_handler: ^11.1.0

  # Loading & Alerts
  flutter_spinkit: ^5.2.0
  
  # Utilities
  shared_preferences: ^2.2.2  # Local storage
  uuid: ^4.3.0  # Generate UUIDs

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

# App Icon Configuration
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  # Assets
  assets:
    - assets/images/
    - assets/icons/

  # Fonts - Agrandir
  fonts:
    - family: Agrandir
      fonts:
        - asset: assets/fonts/Agrandir-Regular.otf
          weight: 400
        - asset: assets/fonts/Agrandir-TextBold.otf
          weight: 700