name: cancan_vendor
description: Can Can Vendor App - Water can delivery management for vendors
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase (Backend)
  supabase_flutter: ^2.12.0

  # State Management
  provider: ^6.1.2
  flutter_riverpod: ^2.4.9

  # UI Components
  cupertino_icons: ^1.0.8
  google_fonts: ^6.3.3
  flutter_svg: ^2.0.10+1
  fl_chart: ^0.66.2

  # Date & Time
  intl: ^0.17.0
  date_time_picker: ^2.1.0

  # Phone Authentication
  pinput: ^6.0.1  # OTP input field

  # QR Code
  qr_flutter: ^4.1.0

  # URL Launcher (WhatsApp, Phone calls)
  url_launcher: ^6.3.1

  # Image Handling
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  
  # Permissions
  permission_handler: ^12.0.1

  # Environment Variables
  flutter_dotenv: ^6.0.0

  # Loading & Alerts
  flutter_spinkit: ^5.2.1

  # Utilities
  shared_preferences: ^2.5.4  # Local storage
  uuid: ^4.5.1  # Generate UUIDs
  logger: ^2.5.0  # Logging utility
  share_plus: ^7.2.1  # Share functionality
  path_provider: ^2.1.1  # File system access

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4

# App Icon Configuration - Disabled temporarily
# To enable: Add actual PNG icons to assets/icons/ and uncomment below
# flutter_launcher_icons:
#   android: true
#   ios: false  # We'll add iOS later
#   image_path: "assets/icons/app_icon.png"
#   adaptive_icon_background: "#5B8DEF"
#   adaptive_icon_foreground: "assets/icons/app_icon.png"

flutter:
  uses-material-design: true

  # Assets - Add actual assets before uncommenting
  assets:
    - .env

  # Fonts (using Google Fonts, no need to bundle)